version: 0.0.2
type: plugin
author: ki3nd
name: mirage
label:
  en_US: Mirage
  zh_Hans: Mirage
description:
  en_US: Run bash commands (ls, cat, grep, pipes) across S3, Slack, Redis, RAM and more via a unified virtual filesystem.
  zh_Hans: 通过统一虚拟文件系统在 S3、Slack、Redis、RAM 等资源上运行 bash 命令。
icon: icon.svg
resource:
  # Declaration only — the local runtime does not enforce this. The mirage
  # daemon runs as a child subprocess; its RSS is bounded by the OS, not this.
  memory: 1073741824
  permission:
    tool:
      enabled: true
plugins:
  tools:
    - provider/mirage.yaml
meta:
  version: 0.0.2
  arch:
    - amd64
    - arm64
  runner:
    language: python
    version: "3.12"
    entrypoint: main
  minimum_dify_version: 0.0.1
created_at: 2026-07-03T00:00:00.000000000+07:00
privacy: PRIVACY.md
verified: false
